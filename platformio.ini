; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = upesy_wroom

[env:upesy_wroom]
platform = espressif32
board = upesy_wroom
framework = espidf

monitor_speed = 115200

; Test configuration
; Include source files but exclude main.c to avoid app_main() conflict
test_build_src = yes
build_src_filter = +<*> -<main.c>

; Native environment for unit tests (runs on PC, no hardware needed)
[env:native]
platform = native
test_build_src = no
build_flags = 
    -std=c11
    -I src
    --coverage           ; Enable code coverage
    -fprofile-arcs       ; Generate coverage data
    -ftest-coverage      ; Add instrumentation
    -lgcov               ; Link gcov library
build_unflags = -O2      ; Disable optimization for accurate coverage
debug_build_flags = -Og -g
